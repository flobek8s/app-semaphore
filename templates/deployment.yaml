apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "semaphore.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "semaphore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "semaphore.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "semaphore.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: semaphore
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: SEMAPHORE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.adminPassword }}
                  key: SEMAPHORE_ADMIN_PASSWORD
            - name: SEMAPHORE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.db }}
                  key: SEMAPHORE_DB_USER
            - name: SEMAPHORE_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.db }}
                  key: SEMAPHORE_DB_PASS
            - name: SEMAPHORE_ACCESS_KEY_ENCRYPTION
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.accessKeyEncryption }}
                  key: SEMAPHORE_ACCESS_KEY_ENCRYPTION
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            - name: cluster-creds
              mountPath: /etc/semaphore/secrets
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # readinessProbe:
          #   tcpSocket:
          #     port: http
          #   initialDelaySeconds: 10
          #   periodSeconds: 10
          # livenessProbe:
          #   tcpSocket:
          #     port: http
          #   initialDelaySeconds: 30
          #   periodSeconds: 30
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "semaphore.fullname" . }}-data
        {{- end }}
        - name: cluster-creds
          secret:
            secretName: {{ .Values.existingSecrets.clusterCreds }}
